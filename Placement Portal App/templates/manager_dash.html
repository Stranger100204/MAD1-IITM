<!DOCTYPE html>
<html lang="en">
<head>
    <title>Manager Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div id="main">
        <div id="canvas">
            <nav class="navbar navbar-expand-lg bg-body-tertiary">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">Welcome Manager!</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Requests</a>
                        </li>
                        <li class="nav-item">
                        <a class="nav-link active" href="#">Summary</a>
                        </li>
                        <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Log Out</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                    </div>
                </div>
            </nav>
           <div id="content">
                <h3 class="headings">Manage Tables</h3>
                <table class="table text-center border border-3">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Table No.</th>
                            <th>Capacity</th>
                            <th>Location</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                        <th>1</th>
                        <td>T1</td>
                        <td>10</td>
                        <td>Indoor</td>
                        <td>Available</td>
                        <td>
                            <a href="" class="btn btn-warning mx-2">Update</a>
                            <a href="" class="btn btn-danger">Delete</a>
                        </td>
                        </tr>
                    </tbody>
                </table>
                <div class="text-end">
                    <a href="" class="btn btn-primary mx-3 my-3">Create Table</a>
                </div>
           </div> 
        </div>    
    </div>
</body>
</html>
