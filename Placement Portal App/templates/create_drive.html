<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Placement Drive</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #form-body{
            width: 450px;
            height: 490px;
            margin-top: 140px;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="canvas">
            <div id="form-body">

                <h2>Create Placement Drive</h2>

                <!-- FORM -->
                <form method="post">

                    <!-- JOB TITLE -->
                    <div class="mb-3">
                        <label class="form-label">Job Title</label>
                        <input type="text" name="job_title" class="form-control" required>
                    </div>

                    <!-- JOB DESCRIPTION -->
                    <div class="mb-3">
                        <label class="form-label">Job Description</label>
                        <textarea name="description" class="form-control" required></textarea>
                    </div>

                    <!-- ELIGIBILITY -->
                    <div class="mb-3">
                        <label class="form-label">Eligibility (e.g. CGPA >= 7.5)</label>
                        <input type="number" step="0.1" name="eligibility" class="form-control" required>
                    </div>

                    <!-- DEADLINE -->
                    <div class="mb-3">
                        <label class="form-label">Application Deadline</label>
                        <input type="date" name="deadline" class="form-control" required>
                    </div>

                    <div class="text-center">   
                        <input type="submit" class="btn btn-primary" value="Create Drive">
                    </div>

                </form>

            </div>
        </div>
    </div>
</body>
</html>
