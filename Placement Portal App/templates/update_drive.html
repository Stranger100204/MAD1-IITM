<!DOCTYPE html>
<html lang="en">
<head>
    <title>Update Placement Drive</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #form-body{
            width: 400px;
            height: 490px;
            margin-top: 150px;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="canvas">
            <div id="form-body">

                <h2>Update Placement Drive</h2>

                <form method="post">

                    <!-- JOB TITLE -->
                    <div class="mb-3">
                        <label class="form-label">Job Title</label>
                        <input type="text" name="job_title" class="form-control"
                               value="{{ drive.job_title }}" readonly>
                    </div>

                    <!-- DESCRIPTION -->
                    <div class="mb-3">
                        <label class="form-label">Job Description</label>
                        <textarea name="description" class="form-control" readonly>{{ drive.description }}</textarea>
                    </div>

                    <!-- CGPA -->
                    <div class="mb-3">
                        <label class="form-label">Eligibility Criteria</label>
                        <input type="number" name="eligibility" step="0.1" min="0" max="10"
                               class="form-control"
                               value="{{ drive.eligibility }}" required>
                    </div>

                    <!-- DEADLINE -->
                    <div class="mb-3">
                        <label class="form-label">Application Deadline</label>
                        <input type="date" name="deadline" class="form-control"
                               value="{{ drive.deadline }}" required>
                    </div>

                    <div class="text-center">   
                        <input type="submit" class="btn btn-warning" value="Update Drive">
                    </div>

                </form>

            </div>
        </div>
    </div>
</body>
</html>
