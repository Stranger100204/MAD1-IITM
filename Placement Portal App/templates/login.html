<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login Form</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        #form-body{
            height: 365px;
            margin-top: 225px;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="canvas">
            <div id="form-body">
                <h2>Login Form</h2>
                <form action="/login" method="post">
                <div class="mb-3">
                    <label for="Input1" class="form-label">Username</label>
                    <input type="text" class="form-control" id="Input1" name="username" required>
                </div>
                <div class="mb-3">
                    <label for="Input2" class="form-label">Password</label>
                    <input type="password" class="form-control" id="Input2" name="pwd" required>
                </div>
                <div class="text-center">   
                    <input type="submit" class="btn btn-primary" value="Login"><br>
                    New user? <br>
                    <a href="/register/student">Register as Student</a><br>
                    <a href="/register/company">Register as Company</a>
                </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
