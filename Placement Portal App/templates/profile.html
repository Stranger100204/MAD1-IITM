<!DOCTYPE html>
<html lang="en">
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div id="main">
<div id="canvas">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand">Profile</a>

            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/student/dashboard">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/my_applications">My Applications</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/logout">Logout</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- CONTENT -->
    <div id="content">
        <h3 class="headings">Student Profile</h3>

        <form method="post">

            <!-- Student's Name -->
            <div class="mb-3">
                <label>Student's Name</label>
                <input type="text" class="form-control" value="{{ user.username }}" disabled>
            </div>

            <!-- Roll Number -->
            <div class="mb-3">
                <label>Roll Number</label>
                <input type="text" name="roll_no" class="form-control" value="{{ profile.roll_no }}">
            </div>

            <div class="mb-3">
                <label>Branch</label>
                <input type="text" name="branch" class="form-control" value="{{ profile.branch }}">
            </div>

            <!-- CGPA -->
            <div class="mb-3">
                <label>CGPA</label>
                <input type="number" step="0.01" name="cgpa" class="form-control" value="{{ profile.cgpa }}">
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" value="{{ user.email }}">
            </div>

            <!-- Contact Number -->
            <div class="mb-3">
                <label>Contact Number</label>
                <input type="text" name="contact_no" class="form-control" value="{{ profile.contact_no }}">
            </div>

            <div class="text-center">
                <input type="submit" class="btn btn-primary" value="Update">
            </div>

        </form>
    </div>

</div>
</div>

</body>
</html>
